- If the document has NO VAT row, NO ภาษีมูลค่าเพิ่ม label, and NO "VAT" label anywhere → set vatAmount=0 and vatRate=0
- Do NOT assume 7% VAT if it is not explicitly printed on the document
- Many Thai vendors are not VAT-registered and issue receipts with zero VAT — this is normal
- Only set vatAmount > 0 if a VAT amount is clearly printed on the document

WITHHOLDING TAX RULES (ภาษีหัก ณ ที่จ่าย):
Apply WHT only when paying a Thai juristic person or individual for services.
Use the following rates based on the service type detected from the document:

3% WHT — most services:
- Professional services, consulting, legal, accounting, audit
- Security services (รปภ, security guard)
- Cleaning services
- IT services, software, maintenance
- Construction, contractor, repair work (รับเหมา)
- Hotel accommodation
- Any service not listed in another category below

1% WHT — transport and insurance:
- Transport, freight, delivery, logistics (ขนส่ง, ขนของ)
- Insurance premiums of any kind (ประกันภัย)
- Interest payments (ดอกเบี้ย)

2% WHT:
- Advertising, marketing, promotion (โฆษณา, ประชาสัมพันธ์)

5% WHT:
- Property rental (ค่าเช่า, เช่าพื้นที่, เช่าอาคาร)
- Prize or competition winnings (รางวัล)

10% WHT:
- Dividends (เงินปันผล)

0% WHT — NOT subject to WHT:
- Purchase of goods only (no service component)
- Electricity, water, utilities (ไฟฟ้า, น้ำประปา)
- Telephone, internet bills (โทรศัพท์, อินเทอร์เน็ต)
- Petrol, fuel (น้ำมัน, เชื้อเพลิง)
- Government fees and court fees
- Postage and stamps

WHT calculation:
- whtAmount = (totalAmount - vatAmount) × whtRate / 100
- Always calculated on ex-VAT amount
- Round to 2 decimal places
- If whtRate = 0 then whtAmount = 0

Set whtConfidence = "review" when:
- Document contains mixed goods and services
- Service type is ambiguous or unclear
- Document is in Thai only with no clear service category
- WHT rate could be either 1% or 3% based on description

Set whtConfidence = "auto" when service type is clearly identifiable.
If whtRate = 0, always set whtConfidence = "auto".

VENDOR TYPE (for withholding tax form selection):
Set "vendorType" based on the vendor's legal entity type:
- "company" — vendor is a juristic person (บริษัท = company, ห้างหุ้นส่วน = partnership, หจก = limited partnership, Co., Ltd., PLC, Inc., Corp.)
  → WHT is filed on PND53 form
- "individual" — vendor is a natural person (นาย, นาง, นางสาว, น.ส., Mr., Mrs., Ms., Miss — personal name with no company suffix)
  → WHT is filed on PND3 form
- "unknown" — cannot determine from document (vendor name is ambiguous or missing)
  → Bookkeeper will confirm in the UI

Detection rules:
1. Look for company keywords: บริษัท, ห้างหุ้นส่วน, หจก, จำกัด, Co.,Ltd, Co., Ltd., Limited, PLC, Corp → set "company"
2. Look for individual title prefixes: นาย, นาง, นางสาว, น.ส., Mr., Mrs., Ms. → set "individual"
3. If whtRate = 0 (no WHT), vendorType does not affect posting — set "company" as default
4. If vendor name is only Thai characters with no clear company/individual indicator → set "unknown"

SEARCH THE ENTIRE DOCUMENT — every page, every line, every column, every section:

- ใบเสร็จรับเงิน/ใบกำกับภาษี (combined — very common in Thai retail)
- TAX INVOICE (English, any capitalisation, any position)

CRITICAL SEARCH INSTRUCTION: For Go Wholesale, Makro, Lotus and similar Thai retailers:
The words ใบเสร็จรับเงิน/ใบกำกับภาษี appear as a HEADING IN THE MIDDLE of the receipt page.
You MUST scan the entire page carefully — look at EVERY line of text on EVERY page.

- vendorVatNumberValid: must be exactly 13 digits
- hasThaiTaxInvoiceHeading: true if ANY tax invoice words appear ANYWHERE on the document
- IMPORTANT: A vendor TAX ID alone does NOT make a document a tax invoice
- complianceResult: PASS=all required fields present, WARN=minor issues, FAIL=missing critical fields
- Critical fields: vendorVatNumber, documentNumber, documentDate, amountExVat, vatAmount, totalIncVat

TRANSACTION TYPE RULES:
- Bill: formal ใบกำกับภาษี with vendor VAT number, has due date or payment terms, unpaid at time of document
- Expense: ใบเสร็จรับเงิน, cash receipts, already paid at point of purchase, petty cash
- Purchase Order: pre-approval document before goods/services received

THAI LANGUAGE HANDLING:
- Translate ALL Thai text to English accurately
- Thai numbers: ๑=1, ๒=2, ๓=3, ๔=4, ๕=5, ๖=6, ๗=7, ๘=8, ๙=9, ๐=0
- Common Thai accounting terms: ราคา=price, จำนวน=quantity/amount, รวม=total, ส่วนลด=discount, ภาษี=tax, สินค้า=goods, บริการ=service, วันที่=date, ใบเสร็จ=receipt
- IMPORTANT: Food ingredients/supplies purchased for business operations ARE VAT claimable business expenses — NOT entertainment
- Entertainment = client meals at restaurants, staff parties, gifts to clients — NOT VAT claimable
- Numbers only in amount fields (no currency symbols, no commas)
- VAT (ภาษีมูลค่าเพิ่ม) = 7%. WHT (ภาษีหัก ณ ที่จ่าย) extracted separately

LINE ITEM READING — LEFT TO RIGHT:
- In Thai document tables: description is always the leftmost column; total/amount is always the rightmost column
- Thai table column order is typically: description | unit | qty | unit price | ex-VAT amount | (VAT amount) | total
- When columns are misaligned or ambiguous: always use the rightmost numeric value as the line amount

- NEVER use quantity (จำนวน) or unit price (ราคาต่อหน่วย) as the line amount — these are not line totals
- Do not skip or merge line items — include every line separately
