- complianceResult: PASS=all required fields present, WARN=minor issues (heading position unclear, missing buyer VAT etc), FAIL=missing critical fields (no vendor VAT, no amount, no date)

- Minor fields: buyerVatNumber, issuerSignatureOrStamp, buyerAddress, hasThaiTaxInvoiceHeading
- IMPORTANT: hasThaiTaxInvoiceHeading is CRITICAL — Thai Revenue Code requires the words ใบกำกับภาษี to be physically present on the document

- VAT on retail receipts: ALWAYS read the actual VAT amount printed on the document — NEVER calculate VAT from the total
- Thai retail receipts often have a mix of 7% VAT items and 0% VAT items (fresh food, unprocessed items) — the VAT amount shown is already the correct total VAT
- Thai wholesale receipts (Go Wholesale, Makro, Lotus etc.) show a VAT summary table at the bottom with columns: รหัส ภพ. | รวมจำนวนชิ้น | มูลค่าภาษี | มูลค่าสินค้า ExVat | ยอดรวม
- In the line items, VAT CODE column shows V=VAT 7% item, N=Non-VAT item
- The bottom summary table is the authoritative source for totals:
  N=NON VAT row: zero-rated items total
  V=VAT row: 7% VAT items — มูลค่าภาษี column = VAT amount, มูลค่าสินค้า ExVat = amount before VAT
  รวม row: grand totals — USE THESE VALUES
- vatAmount = มูลค่าภาษี from รวม row (e.g. 28.65)
- subtotal = มูลค่าสินค้า ExVat from รวม row (e.g. 943.35)  
- totalAmount = ยอดรวม from รวม row (e.g. 972.00)
- For line item grouping: group V items together, group N items together by product type
- NEVER calculate VAT — always read from the summary table
- NEVER invent amounts — only use figures clearly visible on the document
- Page 3 is often a bank payment slip (SCB, KBank etc.) — ignore for accounting data, it just confirms payment
- buyerName/buyerAddress: look in ANY boxed section, table row, or area labeled ชื่อสมาชิก, CustomerName, ผู้ซื้อ, ชื่อ, ที่อยู่ — buyer info is often in a member/customer box in the middle of the receipt

TRANSACTION TYPE RULES:
- Bill: formal ใบกำกับภาษี with vendor VAT number, has due date or payment terms, unpaid at time of document
- Expense: ใบเสร็จรับเงิน, cash receipts, already paid at point of purchase, petty cash

THAI LANGUAGE HANDLING:

- For line items: read each row carefully left to right — description, quantity, unit price, total

// ─── Helpers ─────────────────────────────────────────────────────────────────
function b64url(buf){
  const bytes=new Uint8Array(buf);
  let binary="";
  for(let i=0;i<bytes.byteLength;i++)binary+=String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function genPKCE(){
  const v=b64url(crypto.getRandomValues(new Uint8Array(32)));
  const c=b64url(await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v)));
  return{verifier:v,challenge:c};
}

  async function kvGet(key) {
    try {
      const res = await fetch(`${PROXY}/api/kv`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ action: "get", key })
      });
      const data = await res.json();
      console.log("KV raw response for", key, ":", JSON.stringify(data).slice(0,200));
      if (data.result === null || data.result === undefined) return null;
      // Upstash may triple-encode — keep parsing until we get non-string
      let result = data.result;
      for (let i = 0; i < 5; i++) {
        if (typeof result !== "string") break;
        try { result = JSON.parse(result); } catch { break; }
      }
      return result;
    } catch(e) { console.warn("KV get failed:", e); return null; }
  }

  async function refreshQboToken(client) {
    if (!client.qboRefreshToken) throw new Error("No refresh token — please reconnect QBO");
    const res = await fetch(`${PROXY}/api/qbo-token`, {
      method:"POST", headers:{"Content-Type":"application/json"},

        clientId: client.qboClientId, 
        clientSecret: client.qboClientSecret,

      })
    });
    const d = await res.json();
    if (d.error) throw new Error("Token refresh failed: " + d.error);
    const newToken = d.access_token;
    const newRefresh = d.refresh_token || client.qboRefreshToken;
    const newExpiry = Date.now() + ((d.expires_in || 3600) * 1000);
    // Update client with new tokens
    const updated = clients.map(c => c.id === client.id 
      ? {...c, qboToken: newToken, qboRefreshToken: newRefresh, qboTokenExpiry: newExpiry}
      : c
    );

    kvSet(`clients:${KV_USER}`, lightweight).catch(e => console.warn("KV token save failed:", e));

  }

  async function getValidQboClient(client) {
    // Check if token is expired or about to expire (within 5 minutes)
    const expiry = client.qboTokenExpiry || 0;
    const fiveMinutes = 5 * 60 * 1000;
    if (expiry && Date.now() > expiry - fiveMinutes) {
      console.log("QBO token expiring soon — refreshing automatically...");
      try {
        return await refreshQboToken(client);
      } catch(e) {
        console.warn("Auto-refresh failed:", e.message);
        return client; // Return original and let the API call fail naturally
      }
    }
    return client;
  }

  async function qboGet(client, path) {
    const validClient = await getValidQboClient(client);
    const res = await fetch(`${PROXY}/api/qbo`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ token: validClient.qboToken, realmId: validClient.qboRealmId, method:"GET", path, env: validClient.qboEnv || "sandbox" })
    });
    const data = await res.json();
    // If 401, try refreshing token once
    if (data.fault?.error?.[0]?.code === "3200" || res.status === 401) {
      console.log("QBO 401 — attempting token refresh...");
      try {
        const refreshed = await refreshQboToken(validClient);
        const res2 = await fetch(`${PROXY}/api/qbo`, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ token: refreshed.qboToken, realmId: refreshed.qboRealmId, method:"GET", path, env: refreshed.qboEnv || "sandbox" })
        });
        return res2.json();
      } catch(e) { console.warn("Refresh failed:", e.message); }
    }
    return data;
  }

  async function loadChartOfAccounts(client) {
    try {
      // Load ALL Chart of Accounts in batches of 200
      let allAccounts = [];
      let startPosition = 1;
      let hasMore = true;
      while (hasMore) {
        const data = await qboGet(client, `/query?query=select * from Account where Active = true STARTPOSITION ${startPosition} MAXRESULTS 200`);
        const batch = data.QueryResponse?.Account || [];
        allAccounts = [...allAccounts, ...batch];
        if (batch.length < 200) {
          hasMore = false; // Last batch
        } else {
          startPosition += 200; // Fetch next batch
        }
      }
      const accounts = allAccounts.map(a => ({ id: a.Id, name: a.Name, type: a.AccountType, subtype: a.AccountSubType }));

      // Load custom field definitions
      let customFields = client.customFields || {};
      try {
        // Try fetching from existing Purchase transactions with enhancedCustomFields
        const expData = await qboGet(client, `/query?query=select * from Purchase MAXRESULTS 5`);
        const purchases = expData.QueryResponse?.Purchase || [];
        purchases.forEach(tx => {
          (tx.CustomField||[]).forEach(cf => {
            if (cf.Name && cf.DefinitionId) {

          (tx.CustomField||[]).forEach(cf => {

              customFields[cf.Name.toLowerCase()] = { definitionId: cf.DefinitionId, name: cf.Name, type: cf.Type };

          });

        // Try CompanyInfo custom fields
        try {
          const compData = await qboGet(client, `/companyinfo/${client.qboRealmId}`);
          const compCF = compData.CompanyInfo?.CustomField || [];
          compCF.forEach(cf => {
            if (cf.Name && cf.DefinitionId) {

            }
          });

          try {
            const schemaData = await qboGet(client, `/query?query=select * from ${entity} where Id = '0'&include=enhancedAllCustomFields`);
            // Even empty results may return custom field schema in some QBO versions

                }

        // If still no custom fields found, try fetching most recent transactions
        if (Object.keys(customFields).length === 0) {
          try {
            const recentExp = await qboGet(client, `/query?query=select * from Purchase ORDERBY MetaData.LastUpdatedTime DESC MAXRESULTS 10&include=enhancedAllCustomFields`);
            (recentExp.QueryResponse?.Purchase||[]).forEach(tx => {
              (tx.CustomField||[]).forEach(cf => {

                  customFields[cf.Name.toLowerCase()] = { definitionId: cf.DefinitionId, name: cf.Name, type: cf.Type };

  async function checkDuplicates(client, extracted) {
    try {
      const amount = Math.abs(extracted.totalAmount||0);
      // Search with ฿5 tolerance — catches rounding differences between invoice and tax invoice
      const tolerance = 5;
      const minAmt = (amount - tolerance).toFixed(2);
      const maxAmt = (amount + tolerance).toFixed(2);

      // QBO doesn't support range queries easily so fetch by exact amount first
      // then also fetch recent transactions for vendor matching
      const billQuery = `/query?query=select * from Bill where TotalAmt = '${amount}' MAXRESULTS 20`;
      const expQuery = `/query?query=select * from Purchase where TotalAmt = '${amount}' MAXRESULTS 20`;

      const [billData, expData] = await Promise.all([
        qboGet(client, billQuery),
        qboGet(client, expQuery)
      ]);

      let bills = (billData.QueryResponse?.Bill || []).map(b=>({...b,_type:"Bill"}));
      let expenses = (expData.QueryResponse?.Purchase || []).map(e=>({...e,_type:"Expense"}));

      // If no exact match, try fetching recent transactions and filter by vendor+approximate amount
      if (bills.length === 0 && expenses.length === 0 && extracted.vendor) {
        const vendorName = (extracted.vendor||"").slice(0,30).replace(/'/g,"");
        const recentExp = await qboGet(client, `/query?query=select * from Purchase ORDERBY MetaData.LastUpdatedTime DESC MAXRESULTS 50`);
        const recentBill = await qboGet(client, `/query?query=select * from Bill ORDERBY MetaData.LastUpdatedTime DESC MAXRESULTS 50`);
        
        // Filter by amount within tolerance
        const matchExp = (recentExp.QueryResponse?.Purchase||[])
          .filter(tx => Math.abs((tx.TotalAmt||0) - amount) <= tolerance)
          .map(e=>({...e,_type:"Expense"}));
        const matchBill = (recentBill.QueryResponse?.Bill||[])
          .filter(tx => Math.abs((tx.TotalAmt||0) - amount) <= tolerance)
          .map(b=>({...b,_type:"Bill"}));
        
        bills = matchBill;
        expenses = matchExp;
      }

      return [...bills, ...expenses];
    } catch(e) { return []; }
  }

  // Update existing QBO transaction with tax invoice number and new PDF
  async function updateExistingTransaction(client, existingTx, taxInvoiceNumber, fileData, fileName) {
    try {
      const txType = existingTx._type;
      const txId = existingTx.Id;

      // Fetch full transaction to get latest SyncToken — required for updates
      const endpoint = txType === "Bill" ? `/bill/${txId}` : `/purchase/${txId}`;
      const fullTxData = await qboGet(client, endpoint);
      const fullTx = txType === "Bill" ? fullTxData.Bill : fullTxData.Purchase;
      
      if (!fullTx) throw new Error(`Could not fetch ${txType} #${txId} for update`);
      
      const syncToken = fullTx.SyncToken;
      const currentNote = fullTx.PrivateNote || "";

      // Build sparse update with latest SyncToken
      const updatedNote = currentNote + ` | Tax Invoice: ${taxInvoiceNumber} (added ${new Date().toLocaleDateString()})`;
      
      if (txType === "Bill") {
        const updateBody = {
          Id: txId,
          SyncToken: syncToken,
          sparse: true,
          PrivateNote: updatedNote,
        };
        const res = await qboPost(client, "/bill", updateBody);
        if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Detail || res.Fault.Error?.[0]?.Message || "Update failed");
      } else {
        // Purchase requires PaymentType and AccountRef even for sparse updates
        const updateBody = {
          Id: txId,
          SyncToken: syncToken,
          sparse: true,
          PaymentType: fullTx.PaymentType || "Cash",
          AccountRef: fullTx.AccountRef,
          PrivateNote: updatedNote,
        };
        const res = await qboPost(client, "/purchase", updateBody);
        if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Detail || res.Fault.Error?.[0]?.Message || "Update failed");
      }

      // Attach new PDF to existing transaction
      // QBO Attachable API uses "Purchase" not "Expense" for expense transactions
      const attachEntityType = txType === "Bill" ? "Bill" : "Purchase";
      let attachError = null;
      if (fileData && txId) {
        try {
          const attachRes = await fetch(`${PROXY}/api/qbo-attach`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              token: client.qboToken, realmId: client.qboRealmId,
              fileData, fileName,
              entityType: attachEntityType, entityId: String(txId),
              env: client.qboEnv || "sandbox"
            })
          });
          const attachData = await attachRes.json();
          console.log("Attach response:", JSON.stringify(attachData));
          if (attachData.Fault) {
            attachError = attachData.Fault.Error?.[0]?.Detail || attachData.Fault.Error?.[0]?.Message;
            console.warn("Attach QBO error:", attachError);
          } else if (attachData.error) {
            attachError = attachData.error;
            console.warn("Attach proxy error:", attachError);
          }
        } catch(e) { 
          attachError = e.message;
          console.warn("Attachment failed:", e); 
        }
      }

      return { success: true, txId, txType, attachError };
    } catch(e) {
      return { success: false, error: e.message };
    }
  }

  // Fuzzy vendor name matching
  function vendorSimilarity(a, b) {
    const clean = s => s.toLowerCase().replace(/co\.?,?\s*ltd\.?|limited|company|public|co\.|inc\.?|corp\.?|\s+/g," ").replace(/[^a-z0-9 ]/g,"").trim();
    const ca = clean(a), cb = clean(b);
    if (ca === cb) return 100;
    if (ca.includes(cb) || cb.includes(ca)) return 90;
    // Count matching words
    const wa = new Set(ca.split(" ")), wb = new Set(cb.split(" "));
    let matches = 0;
    wa.forEach(w => { if(w.length > 2 && wb.has(w)) matches++; });
    const score = Math.round((matches / Math.max(wa.size, wb.size)) * 100);
    return score;
  }

  // ── Thai VAT Handling ────────────────────────────────────────────────
  function isEntertainmentExpense(description, client) {
    const keywords = (client?.nonClaimableVat || "entertainment,client entertainment,staff party,client dinner,client lunch,gift,alcohol,wine,beer,เลี้ยงรับรอง,ของขวัญ")
      .split(",").map(k => k.trim().toLowerCase()).filter(Boolean);
    const desc = (description || "").toLowerCase();
    return keywords.some(k => desc.includes(k));
  }

  function buildVATLines(ex, client, expenseLineRefs) {
    // Determine if VAT is claimable
    const hasValidTaxInvoice = !!(ex.taxInvoiceCompliance?.vendorVatNumberValid && ex.taxInvoiceNumber);
    // hasAnyTaxInvoice requires explicit tax invoice heading — TAX ID alone is NOT sufficient
    // A regular invoice or quotation can have a TAX ID without being a valid ใบกำกับภาษี
    // Tax invoice heading MUST be present — Thai Revenue Code requirement
    // Having vendor VAT + VAT amount alone is NOT sufficient — words must appear on document
    const hasAnyTaxInvoice = !!(
      ex.taxInvoiceNumber || 
      ex.taxInvoiceCompliance?.hasThaiTaxInvoiceHeading
    );
    const isEntertainment = expenseLineRefs.some(l => isEntertainmentExpense(l.description, client));

    // If entertainment — no VAT claim at all
    if (isEntertainment || !ex.vatAmount || ex.vatAmount <= 0) return { vatLines: [], vatType: "none" };

    // Determine which VAT account to use
    const vatAccount = hasAnyTaxInvoice
      ? (client?.inputTaxConfirmed || "Input Tax - Confirmed")
      : (client?.inputTaxPending || "Input Tax - Pending");

    const vatType = hasAnyTaxInvoice ? "confirmed" : "pending";

    // Find account in chart
    const accounts = client?.chartOfAccounts || [];
    const vatAcc = accounts.find(a => a.name === vatAccount);

    // Build meaningful VAT line description for reconciliation
    const voucherRef = ex.voucherNumber || "";
    const vendorRef2 = ex.vendor || "";
    const taxInvRef = ex.taxInvoiceNumber ? ` | Tax Inv: ${ex.taxInvoiceNumber}` : "";
    const vatDesc = vatType === "confirmed"
      ? `Input VAT ${ex.vatRate||7}% ✅ | ${[voucherRef, vendorRef2].filter(Boolean).join(" | ")}${taxInvRef}`
      : `Input VAT ${ex.vatRate||7}% ⏳ Pending Tax Invoice | ${[voucherRef, vendorRef2].filter(Boolean).join(" | ")}`;

    // Always use the exact VAT amount from the document — never recalculate
    // Some items may be 0% VAT (fresh food) so total × 7/107 would be wrong
    return {
      vatLines: vatAcc ? [{
        Amount: Math.abs(ex.vatAmount),
        DetailType: "AccountBasedExpenseLineDetail",
        AccountBasedExpenseLineDetail: { AccountRef: { value: vatAcc.id, name: vatAcc.name } },
        Description: vatDesc
      }] : [],
      vatType,
      vatAccount,
      vatAcc
    };
  }

  // Create journal entry to move VAT from Pending to Confirmed
  async function createVATTransferJournal(client, vatAmount, docDate, reference, extra={}) {
    const accounts = client?.chartOfAccounts || [];
    const confirmedAcc = accounts.find(a => a.name === (client?.inputTaxConfirmed || "Input Tax - Confirmed"));
    const pendingAcc = accounts.find(a => a.name === (client?.inputTaxPending || "Input Tax - Pending"));

    if (!confirmedAcc || !pendingAcc) {
      console.warn("VAT transfer accounts not found");
      return null;
    }

    // Build description matching the original VAT line format for easy reconciliation
    const voucherPart = extra?.voucherNumber ? extra.voucherNumber : "";
    const vendorPart = extra?.vendor ? extra.vendor : "";
    const taxInvPart = reference ? `| Tax Inv: ${reference}` : "";
    const journalDesc = `Input VAT 7% ✅ | ${[voucherPart, vendorPart].filter(Boolean).join(" | ")} ${taxInvPart}`.trim();

    const journalBody = {
      TxnDate: docDate,
      PrivateNote: `VAT transfer Pending → Confirmed | ${[voucherPart, vendorPart].filter(Boolean).join(" | ")} | Tax Invoice: ${reference}`,
      Line: [
        {
          JournalEntryLineDetail: {
            PostingType: "Debit",
            AccountRef: { value: confirmedAcc.id, name: confirmedAcc.name }
          },
          DetailType: "JournalEntryLineDetail",
          Amount: Math.abs(vatAmount),
          Description: journalDesc
        },
        {
          JournalEntryLineDetail: {
            PostingType: "Credit",
            AccountRef: { value: pendingAcc.id, name: pendingAcc.name }
          },
          DetailType: "JournalEntryLineDetail",
          Amount: Math.abs(vatAmount),
          Description: journalDesc
        }
      ]
    };

    const res = await qboPost(client, "/journalentry", journalBody);
    if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Message || "Journal entry failed");
    return res.JournalEntry?.Id;
  }

  // ── Reference Number Helpers ────────────────────────────────────────
  function extractVoucherFromFilename(fileName) {
    // Look for PC followed by digits in filename e.g. PC1234, PC-1234, PC_1234
    const match = (fileName||"").match(/PC[-_]?(\d+)/i);
    return match ? `PC${match[1]}` : null;
  }

  function buildRefNumber(extracted, fileName, txType) {
    if (!extracted) return { refNo: "", flagMissing: false };
    if (txType === "Expense" || txType === "Purchase Order") {
      // Expenses: DocNumber = voucher number ONLY (PC2603109)
      // Tax invoice number goes to custom field, supplier inv goes to memo
      const voucher = extracted.voucherNumber || extractVoucherFromFilename(fileName);
      if (voucher) {
        return { refNo: voucher.slice(0, 21), flagMissing: false };
      } else {
        return { refNo: "", flagMissing: true };
      }
    }
    // Bills: DocNumber = supplier invoice number only (truncated to 21)
    return { refNo: (extracted.documentNumber || "").slice(0, 21), flagMissing: false };
  }

  function savePeriodClose(clientId, periodKey, closedDate) {

    const periods = getClosedPeriods(clientId);

  function getPeriodKey(dateStr) {
    // dateStr = MM/DD/YYYY → returns "YYYY-MM"
    const parts = dateStr?.split("/");
    if (!parts || parts.length < 3) return null;
    return `${parts[2]}-${parts[0].padStart(2,"0")}`;
  }

  function getPeriodLabel(periodKey) {
    // "2026-01" → "January 2026"
    const [year, month] = periodKey.split("-");
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    return `${months[parseInt(month)-1]} ${year}`;
  }

  function isPeriodClosed(clientId, dateStr) {
    const periodKey = getPeriodKey(dateStr);
    if (!periodKey) return false;
    const periods = getClosedPeriods(clientId);
    return !!periods[periodKey];
  }

  function getNextOpenPeriodDate(clientId, docDateStr) {
    // Returns suggested posting dates when period is closed
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth(); // 0-indexed
    // First day of current month
    const firstOfCurrent = `${(currentMonth+1).toString().padStart(2,"0")}/01/${currentYear}`;
    // Last day of previous month
    const lastOfPrev = new Date(currentYear, currentMonth, 0);
    const lastOfPrevStr = `${(lastOfPrev.getMonth()+1).toString().padStart(2,"0")}/${lastOfPrev.getDate()}/${lastOfPrev.getFullYear()}`;
    return { firstOfCurrent, lastOfPrev: lastOfPrevStr };
  }

  // Check duplicates, then period, then post
  async function checkPeriodAndPost(client, result, ri) {
    const ex = result.extracted;

    // Step 1: Check for duplicates in QBO first
    if (ex && client.qboConnected) {
      setPostStatus(s=>({...s,[ri]:{status:"posting", message:"Checking for duplicates..."}}));
      const matches = await checkDuplicates(client, ex);

      if (matches.length > 0) {
        const best = matches[0];
        const confidence = Math.round(
          (vendorSimilarity(ex.vendor||"", best.VendorRef?.name||best.EntityRef?.name||"") * 0.5) +
          (Math.abs((ex.totalAmount||0) - (best.TotalAmt||0)) < 1 ? 50 : 0)
        );

        // Use wider tolerance — ฿5 rounding difference still counts as duplicate
        const amountTolerance = 5;
        const recalcConfidence = Math.round(
          (vendorSimilarity(ex.vendor||"", best.VendorRef?.name||best.EntityRef?.name||"") * 0.6) +
          (Math.abs((ex.totalAmount||0) - (best.TotalAmt||0)) <= amountTolerance ? 40 : 
           Math.abs((ex.totalAmount||0) - (best.TotalAmt||0)) <= 20 ? 20 : 0)
        );
        const effectiveConfidence = Math.max(confidence, recalcConfidence);

        if (effectiveConfidence >= 50) {
          const existingDate = best.TxnDate || "";
          const existingRef = best.DocNumber || best.Id;
          const hasTaxInvoice = !!(ex.taxInvoiceNumber && ex.taxInvoiceNumber !== ex.documentNumber);
          const amountDiff = Math.abs((ex.totalAmount||0) - (best.TotalAmt||0));
          const existingVendor = best.VendorRef?.name||best.EntityRef?.name||"";

          // Show proper duplicate modal
          const action = await new Promise(resolve => {
            setDuplicateCheck({
              resolve,
              existing: { type: best._type, ref: existingRef, vendor: existingVendor, amount: best.TotalAmt, date: existingDate, id: best.Id },
              current: { vendor: ex.vendor, amount: ex.totalAmount, date: ex.documentDate, taxInvoice: hasTaxInvoice ? ex.taxInvoiceNumber : null },
              confidence: effectiveConfidence,
              amountDiff,
              ri,
            });
          });
          setDuplicateCheck(null);

          if (action === "dismiss") {
            setTimeout(() => setResults(prev => prev.filter((_,i) => i !== ri)), 100);
            return;
          }

          if (action !== "new") {
            // update or attach
            setPostStatus(s=>({...s,[ri]:{status:"posting", message:"Updating existing transaction..."}}));
            const updateResult = await updateExistingTransaction(
              client, best,
              ex.taxInvoiceNumber || ex.documentNumber,
              result.fileData, result.file
            );
            if (updateResult.success) {
              if (updateResult.attachError) console.warn("PDF attachment error:", updateResult.attachError);
              if (ex.vatAmount > 0 && (best.PrivateNote||"").includes("Pending")) {
                try {
                  setPostStatus(s=>({...s,[ri]:{status:"posting", message:"Creating VAT transfer journal..."}}));
                  const journalId = await createVATTransferJournal(
                    client, ex.vatAmount, ex.documentDate,
                    ex.taxInvoiceNumber || ex.documentNumber,
                    { voucherNumber: ex.voucherNumber, vendor: ex.vendor }
                  );
                  setPostStatus(s=>({...s,[ri]:{status:"posted", qboId:updateResult.txId, txType:updateResult.txType, updated:true, journalId}}));
                } catch(e) {
                  setPostStatus(s=>({...s,[ri]:{status:"posted", qboId:updateResult.txId, txType:updateResult.txType, updated:true, journalError:e.message}}));
                }
              } else {
                setPostStatus(s=>({...s,[ri]:{status:"posted", qboId:updateResult.txId, txType:updateResult.txType, updated:true}}));
              }
              // Auto-dismiss after update
              setTimeout(() => {
              setResults(prev => {
                const remaining = prev.filter((_,i) => i !== ri);
                if (remaining.length === 0) setStage(STAGES.IDLE);
                return remaining;
              });
            }, 4000);
            } else {
              setPostStatus(s=>({...s,[ri]:{status:"error", error:"Update failed: "+updateResult.error}}));
            }
            return;
          }
          // action === "new" — fall through to normal posting
        }
      }
    }

    // Step 2: Check period
    const docDate = ex?.documentDate;
    if (!docDate || !client) {
      await postToQBO(client, result, ri);
      return;
    }
    if (isPeriodClosed(client.id, docDate)) {
      const periodKey = getPeriodKey(docDate);
      const closedPeriods = getClosedPeriods(client.id);
      const closedOn = closedPeriods[periodKey]?.closedOn;
      const suggested = getNextOpenPeriodDate(client.id, docDate);
      setPeriodModal({ result, ri, client, docDate, periodKey, closedOn, suggested });
    } else {
      await postToQBO(client, result, ri);
    }
  }

  function getGLMemory(clientId) {

  function learnGLRule(clientId, vendor, txType, keywords, accountName) {
    const memory = getGLMemory(clientId);
    // Learn vendor rule
    const vendorKey = vendor.toLowerCase().trim();
    memory.vendors = memory.vendors || {};
    memory.vendors[vendorKey] = memory.vendors[vendorKey] || {};
    memory.vendors[vendorKey][txType] = { account: accountName, count: (memory.vendors[vendorKey][txType]?.count || 0) + 1 };
    // Learn keyword rules
    memory.keywords = memory.keywords || {};
    const words = keywords.toLowerCase().split(/\s+/).filter(w => w.length > 4);
    words.forEach(word => {
      memory.keywords[word] = memory.keywords[word] || {};
      memory.keywords[word][accountName] = (memory.keywords[word][accountName] || 0) + 1;
    });
    saveGLMemory(clientId, memory);
  }

  function suggestGLAccount(clientId, vendor, txType, description, aiSuggestion, availableAccounts, customRules) {
    const memory = getGLMemory(clientId);
    const vendorKey = (vendor||"").toLowerCase().trim();
    const descLower = (description||"").toLowerCase();
    const vendorLower = (vendor||"").toLowerCase();

    // 0. Check custom rules first (highest priority)
    if (customRules) {
      const lines = customRules.split("\n").filter(l=>l.includes("→")||l.includes("->"));
      for (const line of lines) {
        const [keysPart, accountPart] = line.split(/→|->/).map(s=>s.trim());
        if (!keysPart || !accountPart) continue;
        const keywords = keysPart.split(",").map(k=>k.trim().toLowerCase());
        const matches = keywords.some(k => k && (descLower.includes(k) || vendorLower.includes(k)));
        if (matches) {
          const exists = availableAccounts.find(a => a.name.toLowerCase() === accountPart.toLowerCase());
          if (exists) return { account: exists.name, source: "rule", confidence: 100 };
          // Fuzzy match the rule account name
          const fuzzy = availableAccounts.map(a=>({name:a.name,score:vendorSimilarity(accountPart,a.name)})).sort((a,b)=>b.score-a.score)[0];
          if (fuzzy && fuzzy.score >= 70) return { account: fuzzy.name, source: "rule", confidence: 95 };
        }
      }
    }

    // 1. Check vendor + txType exact memory (highest confidence)
    if (memory.vendors?.[vendorKey]?.[txType]?.count >= 1) {
      const learnedAccount = memory.vendors[vendorKey][txType].account;
      const exists = availableAccounts.find(a => a.name === learnedAccount);
      if (exists) return { account: learnedAccount, source: "learned", confidence: 100 };
    }

    // 2. Check keyword memory
    const words = (description||"").toLowerCase().split(/\s+/).filter(w => w.length > 4);
    const keywordScores = {};
    words.forEach(word => {
      if (memory.keywords?.[word]) {
        Object.entries(memory.keywords[word]).forEach(([acc, count]) => {
          keywordScores[acc] = (keywordScores[acc] || 0) + count;
        });
      }
    });
    if (Object.keys(keywordScores).length > 0) {
      const bestKeyword = Object.entries(keywordScores).sort((a,b) => b[1]-a[1])[0];
      const exists = availableAccounts.find(a => a.name === bestKeyword[0]);
      if (exists && bestKeyword[1] >= 2) return { account: bestKeyword[0], source: "keyword", confidence: 90 };
    }

    // 3. Use AI suggestion if it exists in chart of accounts
    if (aiSuggestion) {
      const exactMatch = availableAccounts.find(a => a.name === aiSuggestion);
      if (exactMatch) return { account: aiSuggestion, source: "ai", confidence: 75 };
      // Fuzzy match AI suggestion to available accounts
      const fuzzy = availableAccounts.map(a => ({
        name: a.name,
        score: vendorSimilarity(aiSuggestion, a.name)
      })).sort((a,b) => b.score-a.score)[0];
      if (fuzzy && fuzzy.score >= 70) return { account: fuzzy.name, source: "ai_fuzzy", confidence: fuzzy.score };
    }

    // 4. No suggestion — must select manually
    return { account: null, source: "none", confidence: 0 };
  }

  // Move file to Done folder via Graph API
  async function moveFileToDone(fileId, driveId, currentFolderPath, client, token) {
    try {
      const doneFolderName = client?.doneFolderName || "✅ Done";
      const parentId = currentFolderPath[currentFolderPath.length - 1]?.id;
      // Check if Done folder exists, create if not
      let doneFolderId;
      try {
        const existing = await gFetch(
          `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${parentId}/children?$filter=name eq '${encodeURIComponent(doneFolderName)}'`,
          token
        );
        if (existing.value?.length > 0) {
          doneFolderId = existing.value[0].id;
        } else {
          // Create Done folder
          const created = await fetch(
            `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${parentId}/children`,
            { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
              body: JSON.stringify({ name: doneFolderName, folder: {}, "@microsoft.graph.conflictBehavior": "rename" }) }
          );
          const data = await created.json();
          doneFolderId = data.id;
        }
      } catch(e) { console.warn("Could not find/create Done folder:", e); return; }
      // Move file
      await fetch(
        `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${fileId}`,
        { method: "PATCH", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ parentReference: { id: doneFolderId } }) }
      );
    } catch(e) { console.warn("Move to Done failed:", e); }
  }

  // Build CustomField array for QBO — defined at top level to avoid scope issues
  function buildCustomFields(client, taxInvoiceNumber) {
    const fields = [];
    if (!taxInvoiceNumber) return fields;
    const customFields = client?.customFields || {};
    
    // Look for tax invoice field — check all possible name variations
    const taxInvField = customFields["tax invoice"] || 
                        customFields["tax invoice no"] || 
                        customFields["tax invoice number"] ||
                        customFields["taxinvoice"] ||
                        Object.values(customFields).find(f => f.name?.toLowerCase().includes("tax"));
    
    // Get the best DefinitionId — prefer manual override, then auto-detected
    const manualId = client?.taxInvoiceFieldId?.trim();
    const autoId = taxInvField?.definitionId;
    const definitionId = manualId || autoId;
    
    if (definitionId) {

  async function postToQBO(client, result, ri) {
    setPostStatus(s=>({...s,[ri]:{status:"posting"}}));
    try {
      const ex = result.extracted;

      // Guard against null extracted data
      if (!ex) {
        setPostStatus(s=>({...s,[ri]:{status:"error", error:"No extracted data — please re-process this document first"}}));
        return;
      }

      const accounts = client.chartOfAccounts || [];

      // GL account resolution with learning
      // All accounts available — petty cash can post to any account type
      // (expenses, assets, liabilities etc.)
      const expenseAccounts = accounts;

      const resolveGLAccount = async (aiSuggestedName, description) => {
        // No modal — use the account already selected on the results screen
        // User reviews and edits GL accounts directly on screen before clicking Post
        const suggestion = suggestGLAccount(
          client.id, ex.vendor, ex.transactionType, description, aiSuggestedName, expenseAccounts, client.customRules
        );
        const accountName = aiSuggestedName || suggestion.account;
        if (!accountName) return null;
        const acc = expenseAccounts.find(a => a.name === accountName);
        if (acc) return { value: acc.id, name: acc.name };
        // Fuzzy match if exact not found
        const fuzzy = expenseAccounts.find(a => a.name.toLowerCase().includes(accountName.toLowerCase()) || accountName.toLowerCase().includes(a.name.toLowerCase()));
        if (fuzzy) return { value: fuzzy.id, name: fuzzy.name };
        return null;
      };

      // Vendor matching — required for Bills, optional for Expenses
      const extractedVendor = ex.vendor || "";
      let vendorRef = null;

      if (ex.transactionType === "Bill") {
        // Bills MUST have a vendor — full fuzzy matching required
        const vendorQuery = await qboGet(client, `/query?query=select * from Vendor MAXRESULTS 500`);
        const allVendors = vendorQuery.QueryResponse?.Vendor || [];
        const scored = allVendors.map(v => ({
          vendor: v,
          score: vendorSimilarity(extractedVendor, v.DisplayName)
        })).sort((a,b) => b.score - a.score);
        const bestMatch = scored[0];

        if (bestMatch && bestMatch.score >= 95) {
          vendorRef = { value: bestMatch.vendor.Id, name: bestMatch.vendor.DisplayName };
          setPostStatus(s=>({...s,[ri]:{status:"posting", message:`Matched vendor: ${bestMatch.vendor.DisplayName} (${bestMatch.score}%)`}}));
        } else if (bestMatch && bestMatch.score >= 70) {
          const top3 = scored.slice(0,3).filter(s=>s.score>0);
          const options = top3.map((s,i) => `${i+1}. "${s.vendor.DisplayName}" (${s.score}% match)`).join("\n");
          const choice = window.confirm(
            `Vendor "${extractedVendor}" not found exactly in QBO.\n\nClosest matches:\n${options}\n\nClick OK to use "${bestMatch.vendor.DisplayName}" (${bestMatch.score}% match)\nClick Cancel to create a new vendor instead.`
          );
          if (choice) {
            vendorRef = { value: bestMatch.vendor.Id, name: bestMatch.vendor.DisplayName };
          } else {
            const createNew = window.confirm(`Create new vendor "${extractedVendor}" in QBO?\n\nClick OK to create.\nClick Cancel to abort posting.`);
            if (!createNew) {
              setPostStatus(s=>({...s,[ri]:{status:"error", error:"Posting cancelled — vendor not matched"}}));
              return;
            }
            const newVendor = await qboPost(client, "/vendor", { DisplayName: extractedVendor });
            if (newVendor.Vendor) vendorRef = { value: newVendor.Vendor.Id, name: newVendor.Vendor.DisplayName };
            else throw new Error("Failed to create vendor");
          }
        } else {
          const createNew = window.confirm(
            `Vendor "${extractedVendor}" was not found in QBO and no close matches exist.\n\nCreate "${extractedVendor}" as a new vendor?\n\nClick OK to create.\nClick Cancel to abort posting.`
          );
          if (!createNew) {
            setPostStatus(s=>({...s,[ri]:{status:"error", error:"Posting cancelled — vendor not found in QBO"}}));
            return;
          }
          const newVendor = await qboPost(client, "/vendor", { DisplayName: extractedVendor });
          if (newVendor.Vendor) vendorRef = { value: newVendor.Vendor.Id, name: newVendor.Vendor.DisplayName };
          else throw new Error("Failed to create vendor");
        }
      } else {
        // Expenses — vendor is optional for petty cash
        // Try to match but don't require it — post without vendor if no match
        if (extractedVendor) {
          const vendorQuery = await qboGet(client, `/query?query=select * from Vendor MAXRESULTS 500`);
          const allVendors = vendorQuery.QueryResponse?.Vendor || [];
          const scored = allVendors.map(v => ({
            vendor: v,
            score: vendorSimilarity(extractedVendor, v.DisplayName)
          })).sort((a,b) => b.score - a.score);
          const bestMatch = scored[0];
          if (bestMatch && bestMatch.score >= 95) {
            // High confidence match — use it
            vendorRef = { value: bestMatch.vendor.Id, name: bestMatch.vendor.DisplayName };
          } else if (bestMatch && bestMatch.score >= 70) {
            // Ask if they want to link to existing vendor
            const choice = window.confirm(
              `Possible vendor match found:\n"${bestMatch.vendor.DisplayName}" (${bestMatch.score}% match)\n\nClick OK to link this expense to that vendor.\nClick Cancel to post without a vendor (petty cash style).`
            );
            if (choice) vendorRef = { value: bestMatch.vendor.Id, name: bestMatch.vendor.DisplayName };
            // If cancelled — vendorRef stays null, posts without vendor ✅
          }
          // No match or low confidence — post without vendor silently
        }
        // vendorRef = null means no vendor on the expense — perfectly valid for petty cash
      }

      const rawLines = (ex.lines||[{description: ex.transactions?.[0]?.description||"Service", amount: ex.totalAmount||0, accountName: ex.transactions?.[0]?.category||""}]);

      // Show line review modal before posting — let user verify groupings
      let previewVatType = "none";
      try {
        const vatPreview = buildVATLines(ex, client, rawLines);
        previewVatType = vatPreview.vatType;
      } catch(e) { console.warn("VAT preview failed:", e); }

      // Handle multiple invoices in one document
      if (ex.multipleInvoices && ex.invoices && ex.invoices.length > 1) {
        setPostStatus(s=>({...s,[ri]:{status:"posting", message:`Posting ${ex.invoices.length} bills...`}}));
        const billIds = [];
        const billAmounts = [];
        
        for (let invIdx = 0; invIdx < ex.invoices.length; invIdx++) {
          const inv = ex.invoices[invIdx];
          setPostStatus(s=>({...s,[ri]:{status:"posting", message:`Posting bill ${invIdx+1} of ${ex.invoices.length}...`}}));
          
          // Resolve GL accounts for this invoice's lines
          const invLines = inv.lines || [];
          const resolvedInvLines = [];
          for (const l of invLines) {
            const accountRef = await resolveGLAccount(l.accountName, l.description);
            if (!accountRef) { setPostStatus(s=>({...s,[ri]:{status:"error", error:`GL account not found for: ${l.description}`}})); return; }
            resolvedInvLines.push({...l, accountRef});
          }

          const { vatLines } = buildVATLines({...ex, vatAmount: inv.vatAmount, totalAmount: inv.totalAmount}, client, resolvedInvLines);
          const billBody = {
            VendorRef: vendorRef,
            TxnDate: ex.documentDate,
            DueDate: ex.documentDate,
            DocNumber: (inv.documentNumber||"").slice(0,21),
            CustomField: buildCustomFields(client, inv.taxInvoiceNumber||null),
            PrivateNote: `Tax Invoice: ${inv.taxInvoiceNumber||inv.documentNumber} | Voucher: ${ex.voucherNumber} | Bill ${invIdx+1} of ${ex.invoices.length} | Source: ${result.file}`,
            Line: [
              ...resolvedInvLines.map(l => ({
                Amount: Math.abs(l.amount),
                DetailType: "AccountBasedExpenseLineDetail",
                AccountBasedExpenseLineDetail: { AccountRef: l.accountRef },
                Description: (l.description||"").slice(0,4000)
              })),
              ...vatLines
            ].filter(l => l.Amount > 0)
          };

          const billRes = await qboPost(client, "/bill", billBody);
          if (billRes.Fault) throw new Error(billRes.Fault.Error?.[0]?.Detail || `Bill ${invIdx+1} failed`);
          const billId = billRes.Bill?.Id;
          billIds.push(billId);
          billAmounts.push(inv.totalAmount - (inv.vatAmount || 0)); // Ex-VAT amount for payment
        }

        // Create BillPayment linking all bills
        setPostStatus(s=>({...s,[ri]:{status:"posting", message:"Creating petty cash payment..."}}));
        const paymentBody = {
          VendorRef: vendorRef,
          PayType: "Check",
          CheckPayment: {
            BankAccountRef: { value: (client.chartOfAccounts||[]).find(a=>a.name===(client.pettyCashAccount||"Petty cash - office"))?.id, name: client.pettyCashAccount||"Petty cash - office" }
          },
          TotalAmt: ex.totalAmount,
          TxnDate: ex.documentDate,
          DocNumber: (ex.voucherNumber||"").slice(0,21),
          PrivateNote: `Petty Cash payment | Voucher: ${ex.voucherNumber} | Bills: ${billIds.join(', ')} | Source: ${result.file}`,
          Line: billIds.map((billId, i) => ({
            Amount: billAmounts[i],
            LinkedTxn: [{ TxnId: billId, TxnType: "Bill" }]
          }))
        };

        const payRes = await qboPost(client, "/billpayment", paymentBody);
        if (payRes.Fault) throw new Error("BillPayment failed: " + (payRes.Fault.Error?.[0]?.Detail || ""));
        const paymentId = payRes.BillPayment?.Id;

        // Attach PDF to first bill
        if (result.fileData && billIds[0]) {
          try {
            await fetch(`${PROXY}/api/qbo-attach`, {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ token: client.qboToken, realmId: client.qboRealmId, fileData: result.fileData, fileName: result.file, entityType: "Bill", entityId: billIds[0], env: client.qboEnv||"sandbox" })
            });
          } catch(e) { console.warn("PDF attach failed:", e); }
        }

        const trackingId = result.fileId || `upload_${Date.now()}_${result.file}`;
        markFileProcessed(client.id, trackingId, result.file, billIds[0], "Bill", {
          vendor: ex.vendor, amount: ex.totalAmount, currency: ex.currency,
          documentDate: ex.documentDate, voucherNumber: ex.voucherNumber,
          taxInvoiceNumber: ex.invoices.map(i=>i.taxInvoiceNumber).filter(Boolean).join(', ')
        });

        setPostStatus(s=>({...s,[ri]:{status:"posted", qboId: billIds[0], txType:`${ex.invoices.length} Bills + Payment`}}));
        setTimeout(() => setResults(prev => prev.filter((_,i) => i !== ri)), 8000);
        return;
      }

      // Use lines directly from results screen (already reviewed and edited by user)
      const finalRawLines = rawLines;

      // Resolve GL accounts with learning
      const resolvedLines = [];
      for (const l of finalRawLines) {
        const accountRef = await resolveGLAccount(l.accountName, l.description);
        if (!accountRef) {
          setPostStatus(s=>({...s,[ri]:{status:"error", error:"Posting cancelled — GL account not selected"}}));
          return;
        }
        resolvedLines.push({ ...l, accountRef });
      }

      let txId, txType;

      // Build reference numbers
      const { refNo, flagMissing } = buildRefNumber(ex, result.file, ex.transactionType);
      if (flagMissing) {
        const proceed = window.confirm(
          `⚠️ No petty cash voucher number found\n\nFile: ${result.file}\n\nNo PC number was found in the document or filename.\nThe Ref No field will be left blank for manual entry in QBO.\n\nClick OK to post anyway.\nClick Cancel to skip this document.`
        );
        if (!proceed) {
          setPostStatus(s=>({...s,[ri]:{status:"error", error:"Skipped — no voucher number found. Please add manually."}}));
          return;
        }
      }

      // Build VAT lines
      const { vatLines, vatType, vatAccount } = buildVATLines(ex, client, resolvedLines);

      if (ex.transactionType === "Bill") {
        // Line amounts are already ex-VAT — do NOT subtract VAT again
        // VAT is added as a separate line via vatLines
        const allLines = [
          ...resolvedLines.map(l => ({
            Amount: Math.abs(l.amount),
            DetailType: "AccountBasedExpenseLineDetail",
            AccountBasedExpenseLineDetail: { AccountRef: l.accountRef },
            Description: (l.description||"").slice(0, 4000)
          })),
          ...vatLines
        ];
        const billBody = {
          VendorRef: vendorRef,
          TxnDate: ex.documentDate,
          DueDate: ex.dueDate || ex.documentDate,
          DocNumber: (refNo || ex.documentNumber||"").slice(0, 21),
          CustomField: buildCustomFields(client, ex.taxInvoiceNumber||null),
          PrivateNote: `Tax Invoice: ${ex.taxInvoiceNumber||ex.documentNumber} | VAT: ${vatType==="confirmed"?"Confirmed ✅":vatType==="pending"?"Pending ⏳":"Not claimed ❌"} | WHT ${ex.whtRate||0}%: ${ex.whtAmount||0} | Source: ${result.file}${ex.originalDocumentDate ? " | Original doc date: "+ex.originalDocumentDate+" (late posting)" : ""}`,
          Line: allLines.filter(l => l.Amount > 0)
        };
        const res = await qboPost(client, "/bill", billBody);
        if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Message || "Bill creation failed");
        txId = res.Bill?.Id;
        txType = "Bill";
      } else {
        // Expense / Purchase
        // Find petty cash account — check client config name first, then search
        const pettyCashName = client.pettyCashAccount || "Petty Cash";
        // Find payment account — exact name match first, then partial match
        // Search ALL accounts by name — no type restriction whatsoever
        const normalize = s => s.toLowerCase().trim();
        const pettyCashAcc = 
          accounts.find(a => normalize(a.name) === normalize(pettyCashName)) ||
          accounts.find(a => normalize(a.name).includes(normalize(pettyCashName))) ||
          accounts.find(a => normalize(pettyCashName).includes(normalize(a.name)) && a.name.length > 3) ||
          accounts.find(a => normalize(pettyCashName).split(/\s+/).filter(w=>w.length>2).every(w => normalize(a.name).includes(w))) ||
          accounts.find(a => normalize(a.name).includes("petty")) ||
          accounts.find(a => normalize(a.name).includes("cash"));
        if (!pettyCashAcc) {
          // Debug: show what cash-related accounts exist
          const cashAccounts = accounts.filter(a => 
            a.name.toLowerCase().includes("cash") || 
            a.name.toLowerCase().includes("petty") ||
            a.type?.toLowerCase().includes("cash")
          );
          throw new Error(`Payment account "${pettyCashName}" not found.\n\nCash-related accounts found:\n${cashAccounts.map(a=>`• ${a.name} (${a.type})`).join("\n") || "None found"}\n\nPlease update Petty Cash Account Name in client settings.`);
        }
        const expBody = {
          PaymentType: "Cash",
          AccountRef: { value: pettyCashAcc.id, name: pettyCashAcc.name },
          // EntityRef is optional for petty cash — only include if vendor was matched
          ...(vendorRef ? { EntityRef: vendorRef } : {}),
          TxnDate: ex.documentDate,
          DocNumber: (refNo||"").slice(0, 21),
          CustomField: buildCustomFields(client, ex.taxInvoiceNumber||null),
          PrivateNote: `Tax Invoice: ${ex.taxInvoiceNumber||ex.documentNumber} | Voucher: ${ex.voucherNumber||extractVoucherFromFilename(result.file)||""} | WHT ${ex.whtRate||0}%: ${ex.whtAmount||0} | Source: ${result.file}${ex.originalDocumentDate ? " | Original doc date: "+ex.originalDocumentDate+" (late posting)" : ""}`,
          // Line amounts are already ex-VAT — do NOT subtract VAT again
          // VAT is added as a separate line via vatLines
          Line: [
            ...resolvedLines.map(l => ({
              Amount: Math.abs(l.amount),
              DetailType: "AccountBasedExpenseLineDetail",
              AccountBasedExpenseLineDetail: { AccountRef: l.accountRef },
              Description: (l.description||"").slice(0, 4000)
            })),
            ...vatLines
          ].filter(l => l.Amount > 0)
        };
        console.log("Posting expense body:", JSON.stringify(expBody));
        const res = await qboPost(client, "/purchase", expBody);
        console.log("Expense response:", JSON.stringify(res));
        if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Detail || res.Fault.Error?.[0]?.Message || "Expense creation failed");
        if (!res.Purchase?.Id) throw new Error("Expense created but no ID returned — check QBO");
        txId = res.Purchase?.Id;
        txType = "Expense";
      }

      // ── Learn from this posting ──
      resolvedLines.forEach(l => {
        learnGLRule(client.id, ex.vendor, ex.transactionType, l.description, l.accountRef.name);
      });

      // Attach PDF if we have the file data
      // QBO Attachable API uses "Purchase" not "Expense" for expense transactions
      const qboAttachType = txType === "Bill" ? "Bill" : "Purchase";
      if (result.fileData && txId) {
        try {
          setPostStatus(s=>({...s,[ri]:{status:"posting", message:"Attaching PDF..."}}));
          const attachRes = await fetch(`${PROXY}/api/qbo-attach`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              token: client.qboToken, realmId: client.qboRealmId,
              fileData: result.fileData, fileName: result.file,
              entityType: qboAttachType, entityId: String(txId),
              env: client.qboEnv || "sandbox"
            })
          });
          const attachData = await attachRes.json();
          console.log("Attach response:", JSON.stringify(attachData));
          if (attachData.Fault) {
            console.warn("Attachment API error:", attachData.Fault);
            logError("PDF Attachment Failed", new Error(attachData.Fault.Error?.[0]?.Message), { clientName: client.name, fileName: result.file });
          }
        } catch(e) { 
          console.warn("Attachment failed:", e);
          logError("PDF Attachment Failed", e, { clientName: client.name, fileName: result.file });
        }
      }

      // Check if already processed before posting
      const trackingId = result.fileId || `upload_${Date.now()}_${result.file}`;
      const existingRecord = result.fileId ? getProcessedFiles(client.id)[result.fileId] : null;
      if (existingRecord && !window._forceRepost) {
        // Already posted — show in status and auto-dismiss
        const rec = existingRecord;
        setPostStatus(s=>({...s,[ri]:{status:"already_posted", qboId: rec.qboId, txType: rec.txType, processedAt: rec.processedAt}}));
        setTimeout(() => {
          setResults(prev => prev.filter((_,i) => i !== ri));
        }, 5000);
        return;
      }
      // Mark as processed — use fileId for Teams files, generate ID for uploads
      markFileProcessed(client.id, trackingId, result.file, txId, txType, {
        vendor: ex.vendor,
        amount: ex.totalAmount,
        currency: ex.currency,
        documentDate: ex.documentDate,
        taxInvoiceNumber: ex.taxInvoiceNumber,
        voucherNumber: ex.voucherNumber,
      });
      if (result.fileId && graphToken && result.driveId && result.folderPath) {
        await moveFileToDone(result.fileId, result.driveId, result.folderPath, client, graphToken);
      }

      const cfPopulated = buildCustomFields(currentClient||client, ex.taxInvoiceNumber||null).length > 0;
      setPostStatus(s=>({...s,[ri]:{status:"posted", qboId: txId, txType, taxInvField: cfPopulated ? ex.taxInvoiceNumber : null}}));
      // Auto-dismiss handled by useEffect watching postStatus
    } catch(e) {
      logError("QBO Post Failed", e, { clientName: client.name, fileName: result.file, realmId: client.qboRealmId });
      setPostStatus(s=>({...s,[ri]:{status:"error", error: e.message}}));
    }
  }

  // ── Microsoft Graph ──
  async function createBillPayment(client, billIds, billAmounts, totalAmount, paymentDate, voucherNumber) {
    // Create a BillPayment in QBO to pay multiple bills from petty cash
    const pettyCashAcc = (client.chartOfAccounts||[]).find(a => 
      a.name === (client.pettyCashAccount || "Petty cash - office")
    );
    if (!pettyCashAcc) throw new Error("Petty cash account not found — check client settings");

    // Build payment lines for each bill
    const paymentLines = billIds.map((billId, i) => ({
      Amount: billAmounts[i],
      LinkedTxn: [{ TxnId: billId, TxnType: "Bill" }]
    }));

    // Check for rounding variance
    const billTotal = billAmounts.reduce((s, a) => s + a, 0);
    const variance = Math.abs(totalAmount - billTotal);
    
    const billPaymentBody = {
      VendorRef: null, // Will be set by caller
      PayType: "Check",
      CheckPayment: {
        BankAccountRef: { value: pettyCashAcc.id, name: pettyCashAcc.name }
      },
      TotalAmt: totalAmount,
      TxnDate: paymentDate,
      DocNumber: voucherNumber,
      PrivateNote: `Petty Cash payment | Voucher: ${voucherNumber} | Bills: ${billIds.join(', ')}${variance > 0 ? ` | Rounding variance: ฿${variance.toFixed(2)}` : ''}`,
      Line: paymentLines
    };

    console.log("Creating BillPayment:", JSON.stringify(billPaymentBody));
    const res = await qboPost(client, "/billpayment", billPaymentBody);
    if (res.Fault) throw new Error(res.Fault.Error?.[0]?.Detail || "BillPayment failed");
    return res.BillPayment?.Id;
  }

  async function exchangeMsCode(code, verifier, msClientId, msTenantId) {
    // SPA tokens MUST be exchanged directly from browser (Microsoft requirement)
    // PKCE flow allows this without CORS issues
    const clientId = msClientId || settings.msClientId;
    const tenantId = msTenantId || settings.msTenantId;
    if (!clientId || !tenantId) throw new Error("Microsoft Client ID or Tenant ID missing. Please check Settings.");
    const body = new URLSearchParams({
      client_id: clientId,
      grant_type: "authorization_code",
      code,
      redirect_uri: APP_URL,
      code_verifier: verifier,
      scope: GRAPH_SCOPES.join(" "),
    });
    const res = await fetch(`https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/token`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString(),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error_description||d.error);
    return d.access_token;
  }

  async function connectMs() {
    if (!settings.msClientId||!settings.msTenantId) { setAuthError("Please enter Microsoft Client ID and Tenant ID in Settings."); return; }
    const { verifier, challenge } = await genPKCE();
    const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
    // Save credentials in sessionStorage so they survive the redirect
    sessionStorage.setItem("oauth_state", JSON.stringify({ 
      state, type:"ms", verifier, 
      msClientId: settings.msClientId, 
      msTenantId: settings.msTenantId 
    }));
    const authUrl = `https://login.microsoftonline.com/${settings.msTenantId}/oauth2/v2.0/authorize?`+new URLSearchParams({ client_id: settings.msClientId, response_type:"code", redirect_uri: APP_URL, scope: GRAPH_SCOPES.join(" "), state, code_challenge: challenge, code_challenge_method:"S256", prompt:"select_account" });
    window.location.href = authUrl;
  }

  async function gFetch(url, token) {
    const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message||"Graph error"); }
    return r.json();
  }

  async function fetchLocations(token) {
    setStage(STAGES.BROWSING); setShowLocations(true); setFolderPath([]); setGraphFiles([]);
    const locs = [{ id:"onedrive", name:"📁 My OneDrive", type:"onedrive" }];
    try {
      const followed = await gFetch("https://graph.microsoft.com/v1.0/me/followedSites?$select=id,displayName,webUrl", token);
      (followed.value||[]).forEach(s => locs.push({ id:s.id, name:"🔷 "+s.displayName, type:"site", siteId:s.id, webUrl:s.webUrl }));
    } catch{}
    try {
      const joined = await gFetch("https://graph.microsoft.com/v1.0/me/joinedTeams?$select=id,displayName", token);
      for (const team of (joined.value||[])) {
        try {
          const site = await gFetch(`https://graph.microsoft.com/v1.0/groups/${team.id}/sites/root?$select=id,displayName,webUrl`, token);
          if (!locs.find(l=>l.id===site.id)) locs.push({ id:site.id, name:"👥 "+(site.displayName||team.displayName), type:"site", siteId:site.id, webUrl:site.webUrl });
        } catch{}
      }
    } catch{}
    setLocations(locs);
  }

  async function openLocation(loc) {
    setShowLocations(false); setStage(STAGES.BROWSING);
    try {
      let driveId, items;
      if (loc.type==="onedrive") {
        const drive = await gFetch("https://graph.microsoft.com/v1.0/me/drive", graphToken);
        driveId = drive.id;
        const data = await gFetch("https://graph.microsoft.com/v1.0/me/drive/root/children?$top=500&$orderby=name", graphToken);
        items = data.value;
      } else {
        const drives = await gFetch(`https://graph.microsoft.com/v1.0/sites/${loc.siteId}/drives?$select=id,name,driveType`, graphToken);
        const docLib = drives.value.find(d=>d.driveType==="documentLibrary")||drives.value[0];
        driveId = docLib.id;
        const data = await gFetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root/children?$top=500&$orderby=name`, graphToken);
        items = data.value;
      }
      const filtered = sortItems(items.filter(i=>i.folder||i.name?.toLowerCase().endsWith(".pdf")));
      setGraphFiles(filtered);
      setFolderPath([{ name:loc.name, id:"root", driveId }]);
    } catch(e) { setAuthError("Could not open: "+e.message); setShowLocations(true); }
  }

  function sortItems(items){ return [...items].sort((a,b)=>{ if(a.folder&&!b.folder)return -1; if(!a.folder&&b.folder)return 1; return(a.name||"").localeCompare(b.name||""); }); }

  async function browseFolder(item) {
    const driveId = folderPath[folderPath.length-1]?.driveId;
    try {
      const data = await gFetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${item.id}/children?$top=500&$orderby=name`, graphToken);
      setGraphFiles(sortItems(data.value.filter(i=>i.folder||i.name?.toLowerCase().endsWith(".pdf"))));
      setFolderPath(p=>[...p, { name:item.name, id:item.id, driveId }]);
    } catch(e){ setAuthError(e.message); }
  }

  async function navBack(idx) {
    if(idx===-1){ fetchLocations(graphToken); setShowLocations(true); return; }
    const target = folderPath[idx];
    if(target.id==="root"){ const loc=locations.find(l=>l.name===target.name); if(loc){openLocation(loc);return;} }
    try {
      const data = await gFetch(`https://graph.microsoft.com/v1.0/drives/${target.driveId}/items/${target.id}/children?$top=500&$orderby=name`, graphToken);
      setGraphFiles(sortItems(data.value.filter(i=>i.folder||i.name?.toLowerCase().endsWith(".pdf"))));
      setFolderPath(p=>p.slice(0,idx+1));
    } catch(e){ setAuthError(e.message); }
  }

  // ── PDF Processing ──
  async function renderPageToBase64(page) {
    const viewport = page.getViewport({scale:3.0}); // 3x scale — good quality without hitting API limits
    const canvas = document.createElement("canvas");
    canvas.width=viewport.width; canvas.height=viewport.height;
    const ctx = canvas.getContext("2d");
    // White background for thermal receipts
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({canvasContext:ctx,viewport}).promise;
    // Increase contrast to improve Thai text recognition on thermal receipts
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const avg = (data[i] + data[i+1] + data[i+2]) / 3;
      const contrast = avg < 180 ? Math.max(0, avg - 40) : Math.min(255, avg + 20);
      data[i] = data[i+1] = data[i+2] = contrast;
    }
    ctx.putImageData(imageData, 0, 0);
    return canvas.toDataURL("image/jpeg",0.85).split(",")[1]; // 0.85 quality reduces size while keeping readability
  }

  async function processPDF(arrayBuffer, fileName, onStatus) {
    const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    const numPages = Math.min(pdf.numPages, 8); // Up to 8 pages for petty cash bundles
    onStatus("Extracting text...");
    let text="";
    for(let i=1;i<=numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      // Label each page so AI knows which is summary vs invoice
      let pageLabel = `\n--- PAGE ${i} OF ${pdf.numPages}`;
      if (i === 1 && pdf.numPages > 1) pageLabel += " [SUMMARY PAGE — DO NOT use for line items or tax invoice data]";
      else if (i > 1) pageLabel += ` [SUPPLIER INVOICE PAGE — USE THIS for line items, tax invoice, VAT, vendor details]`;
      text += pageLabel + " ---\n";
      text+=content.items.map(it=>it.str).join(" ")+"\n";
    }
    // Check if text is actually readable (not garbled Thai font encoding)
    const cleanText = text.trim().replace(/\s+/g,"");
    // Must have enough readable ASCII/Thai characters — garbled PDFs often have symbols only
    const readableChars = (text.match(/[a-zA-Z0-9ก-๙\s\-\/\.,:฿]/g)||[]).length;
    // Force OCR if text is too short — means most pages are scanned images
    // A 3-page PDF with only 232 chars means page 2+ are scanned, not text
    const hasText = cleanText.length > 800 && readableChars > 400;
    console.log("Text extraction:", cleanText.length, "chars,", readableChars, "readable — using", hasText?"text":"OCR");
    const client = safeClients.find(c=>c.id===activeClient);
    // Limit COA to expense/liability accounts only to avoid stack overflow with large lists
    const allCoa = client?.chartOfAccounts || [];
    // Use ALL accounts for AI classification - no filtering
    const coa = allCoa.slice(0,80);
    const businessType = client?.businessType || "General";
    const wfRules = buildWorkflowRules(client);
    // Build product dictionary section for prompt
    const productDict = client?.productDict || {};
    console.log("Product dict entries:", Object.keys(productDict).length, Object.keys(productDict).slice(0,3));
    const productDictStr = Object.keys(productDict).length > 0
      ? "\n\nPRODUCT DICTIONARY — THIS IS MANDATORY. You MUST use this list for all product name translations.\n" +
        "RULES:\n" +
        "1. Before translating ANY Thai product name, scan this entire dictionary first\n" +
        "2. Find the closest match even if the OCR text is garbled or partially unreadable\n" +
        "3. Handwritten Thai OCR is imperfect — e.g. 'ส.มโง' matches 'ส้มโอ' = Pomelo\n" +
        "4. NEVER use a generic name like 'fruit', 'vegetable', 'item' if a dictionary match exists\n" +
        "5. Match by the first 2-3 characters — they are usually more reliable than the rest\n" +
        "6. If you cannot match, describe what you can read rather than inventing a name\n\n" +
        "DICTIONARY:\n" +
        Object.entries(productDict).map(([thai, eng]) => thai + " = " + eng).join("\n")
      : "";
    const prompt = SYSTEM_PROMPT(coa, businessType, wfRules, client) + productDictStr;

    if(hasText){
      onStatus("AI analyzing text...");
      return await analyzeText(text, fileName, prompt);
    } else {
      // Step 1: Use Google Vision API for accurate Thai OCR on each page
      let combinedText = "";
      const claudeVisionPages = [];
      
      for(let i=1;i<=numPages;i++){
        onStatus(`Reading page ${i} of ${numPages}...`);
        const page=await pdf.getPage(i);
        const b64=await renderPageToBase64(page);
        let pageNote = "";
        if (i === 1 && numPages > 1) {
          pageNote = "THIS IS PAGE 1: SUMMARY SHEET ONLY — do not extract line items from this page.";
        } else {
          pageNote = `THIS IS PAGE ${i}: ACTUAL SUPPLIER INVOICE/RECEIPT — extract ALL data from this page.`;
        }
        try {
          const visionRes = await fetch(`${PROXY}/api/vision`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ image: b64 })
          });
          const visionData = await visionRes.json();
          const pageText = (visionData.text || "").trim();
          
          if (pageText.length < 100) {
            // Too little text — likely handwritten, send to Claude Vision
            console.warn(`Page ${i} Google Vision only got ${pageText.length} chars — using Claude Vision fallback`);
            claudeVisionPages.push({ i, b64, pageNote, partialText: pageText });
          } else {
            combinedText += `\n\n--- PAGE ${i} OF ${numPages} (${pageNote}) ---\n${pageText}`;
            console.log(`Page ${i} Google Vision OCR success: ${pageText.slice(0,80)}...`);
          }
        } catch(e) {
          console.warn(`Page ${i} Vision API failed:`, e.message);
          claudeVisionPages.push({ i, b64, pageNote, partialText: "" });
        }
      }

      // If any pages need Claude Vision fallback
      if (claudeVisionPages.length > 0) {
        console.log(`${claudeVisionPages.length} page(s) using Claude Vision for handwritten content`);
        onStatus("Claude Vision reading handwritten pages...");
        const imageContents = [];
        if (combinedText.trim()) {
          imageContents.push({type:"text", text:`Google OCR text from printed pages:\n${combinedText}`});
        }
        for (const p of claudeVisionPages) {
          imageContents.push({type:"text", text:`\n--- PAGE ${p.i} OF ${numPages} (${p.pageNote}) HANDWRITTEN IMAGE ---`});
          imageContents.push({type:"image", source:{type:"base64", media_type:"image/jpeg", data:p.b64}});
        }
        imageContents.push({type:"text", text:`Extract ALL accounting data (file: ${fileName}). For handwritten pages read each line carefully. Use the PRODUCT DICTIONARY provided to translate Thai product names.`});
        return await analyzeImages(imageContents, prompt);
      }

      if (combinedText.trim()) {
        onStatus("AI analyzing text...");
        console.log("Google Vision combined text:", combinedText.slice(0, 300));
        return await analyzeText(combinedText, fileName, prompt);
      } else {
        console.warn("All pages failed — falling back to full Claude Vision");
        const imageContents=[];
        for(let i=1;i<=numPages;i++){
          onStatus(`Claude OCR page ${i} of ${numPages}...`);
          const page=await pdf.getPage(i);
          const b64=await renderPageToBase64(page);
          let pageNote = i===1&&numPages>1?" — SUMMARY SHEET, skip line items":" — SUPPLIER INVOICE, extract all data";
          imageContents.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}});
          imageContents.push({type:"text",text:`[PAGE ${i} OF ${numPages}${pageNote}]`});
        }
        imageContents.push({type:"text",text:`Extract accounting data from this scanned document (file: ${fileName}). May be Thai or English.`});
        onStatus("AI vision OCR (fallback)...");
        return await analyzeImages(imageContents, prompt);
      }
    }
  }

  function buildWorkflowRules(client) {
    if (!client) return "Default: Bills for formal invoices, Expenses for receipts.";
    let rules = [];
    if (client.defaultTxType) rules.push(`Default transaction type: ${client.defaultTxType}`);
    if (client.pettyCashAccount) rules.push(`Petty cash account: ${client.pettyCashAccount}`);
    if (client.customRules) rules.push(client.customRules);
    rules.push("Bill: has ใบกำกับภาษี, vendor VAT number, payment terms, or due date");
    rules.push("Expense: ใบเสร็จรับเงิน, cash receipt, already paid, petty cash");
    if (client.productDictionary && client.productDictionary.trim()) {
      rules.push(`\nPRODUCT DICTIONARY — use this to correct OCR errors especially on handwritten Thai documents.\nWhen you see text that closely resembles any of these Thai words (even if garbled by OCR), use the correct English name:\n${client.productDictionary}\nExample: "ส.มโง" likely means "ส้มโอ" = Pomelo. Always check the dictionary before translating product names.`);
    }
    return rules.join('\n');
  }

  async function analyzeText(text, fileName, systemPrompt) {
    const headers={"Content-Type":"application/json"};
    if(settings.apiKey) headers["x-api-key"]=settings.apiKey;
    const res=await fetch(`${PROXY}/api/anthropic`,{method:"POST",headers,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,temperature:0,system:systemPrompt,messages:[{role:"user",content:"Extract accounting data (file: "+fileName+"):\n\n"+text.slice(0,12000)}]})});
    const d=await res.json();
    console.log("Anthropic text response:", JSON.stringify(d).slice(0,500));
    if(d.error) { console.error("Anthropic error:", d.error); return null; }
    try{return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());}
    catch(e){console.error("JSON parse error:", e, "Raw:", d.content?.[0]?.text?.slice(0,200)); return null;}
  }

  async function analyzeImages(imageContents, systemPrompt) {
    const headers={"Content-Type":"application/json"};
    if(settings.apiKey) headers["x-api-key"]=settings.apiKey;
    const res=await fetch(`${PROXY}/api/anthropic`,{method:"POST",headers,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,temperature:0,system:systemPrompt,messages:[{role:"user",content:imageContents}]})});
    const d=await res.json();
    console.log("Anthropic image response:", JSON.stringify(d).slice(0,500));
    if(d.error) { console.error("Anthropic error:", d.error); return null; }
    try{return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());}
    catch(e){console.error("JSON parse error:", e, "Raw:", d.content?.[0]?.text?.slice(0,200)); return null;}
  }

  async function processFiles(fileList) {
    if (!activeClient) { alert("Please select a client first."); return; }
    setStage(STAGES.EXTRACTING); setResults([]); setPostStatus({});
    const newResults=[];
    for(let i=0;i<fileList.length;i++){
      const file=fileList[i];
      setProgress({current:i+1,total:fileList.length,message:`${file.name}`});
      try{
        const ab=await file.arrayBuffer();
        // Safe base64 encoding for large files
        let binary2=""; const bytes2=new Uint8Array(ab);
        for(let i=0;i<bytes2.byteLength;i++)binary2+=String.fromCharCode(bytes2[i]);
        const b64=btoa(binary2);
        const extracted=await processPDF(ab,file.name,(msg)=>{
          setProgress({current:i+1,total:fileList.length,message:`${file.name}: ${msg}`});
          setStage(msg.includes("OCR")||msg.includes("vision")?STAGES.ANALYZING:STAGES.EXTRACTING);
        });
        newResults.push({file:file.name,extracted,fileData:b64});
      }catch(err){newResults.push({file:file.name,extracted:null,error:err.message});}
    }
    const sel={};
    newResults.forEach((r,ri)=>{
      if(r.extracted){sel[`${ri}-main`]=true;}
      if(r.extracted?.whtAmount>0)sel[`${ri}-wht`]=true;
    });
    setSelectedRows(sel);
    setResults(newResults);
    setStage(STAGES.DONE);
    // Auto-show compliance for first non-compliant tax invoice
    try {
      const firstNonCompliant = newResults.find(r =>
        r.extracted?.taxInvoiceCompliance &&
        r.extracted.taxInvoiceCompliance.complianceResult !== "PASS"
      );
      if (firstNonCompliant) {
        const ri = newResults.indexOf(firstNonCompliant);
        const report = buildComplianceReport(
          firstNonCompliant.extracted.taxInvoiceCompliance, 
          firstNonCompliant.extracted?.vendor, 
          firstNonCompliant.extracted?.taxInvoiceNumber
        );
        if (report) setComplianceModal({ result: firstNonCompliant, ri, report });
      }
    } catch(e) { console.warn("Compliance modal error:", e); }
  }

  async function downloadAndProcess() {
    if (!activeClient) { alert("Please select a client first."); return; }
    const toProcess=graphFiles.filter(f=>selectedFiles[f.id]&&!f.folder);
    if(!toProcess.length)return;
    setResults([]); setPostStatus({}); setStage(STAGES.EXTRACTING);
    setSelectedFiles({}); // Clear selection so dismissed docs don't get re-processed
    const newResults=[];
    for(let i=0;i<toProcess.length;i++){
      const file=toProcess[i];
      const driveId=folderPath[folderPath.length-1]?.driveId;
      setProgress({current:i+1,total:toProcess.length,message:`Downloading: ${file.name}`});
      try{
        const dlRes=await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/items/${file.id}/content`,{headers:{Authorization:`Bearer ${graphToken}`}});
        const ab=await dlRes.arrayBuffer();
        // Safe base64 encoding for large files
        let binary2=""; const bytes2=new Uint8Array(ab);
        for(let i=0;i<bytes2.byteLength;i++)binary2+=String.fromCharCode(bytes2[i]);
        const b64=btoa(binary2);
        const extracted=await processPDF(ab,file.name,(msg)=>{
          setProgress({current:i+1,total:toProcess.length,message:`${file.name}: ${msg}`});
          setStage(msg.includes("OCR")||msg.includes("vision")?STAGES.ANALYZING:STAGES.EXTRACTING);
        });
        // Override transaction type based on folder name
        const detectedType = detectTxTypeFromFolder(folderPath, safeClients.find(c=>c.id===activeClient));
        if (extracted && detectedType) extracted.transactionType = detectedType;
        newResults.push({
          file: file.name, extracted, fileData: b64, source: "teams",
          fileId: file.id, driveId: folderPath[folderPath.length-1]?.driveId,
          folderPath: [...folderPath]
        });
      }catch(err){newResults.push({file:file.name,extracted:null,error:err.message});}
    }
    const sel={};
    newResults.forEach((r,ri)=>{
      if(r.extracted)sel[`${ri}-main`]=true;
      if(r.extracted?.whtAmount>0)sel[`${ri}-wht`]=true;
    });
    setSelectedRows(sel);
    setResults(newResults);
    setStage(STAGES.DONE);
  }

        });

      if(ex.whtAmount>0&&selectedRows[`${ri}-wht`]){

            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:32,flexWrap:"wrap"}}>
              {["🇹🇭 Thai OCR","🔤 Auto-Translate","🧾 Bill & Expense Detection","📋 WHT Support","🔗 Direct QBO Posting","📎 PDF Attachment","🔍 Duplicate Detection"].map(f=>(

            {Array.from({length:12},(_,i)=>{
              const d = new Date(); d.setMonth(d.getMonth()-i);
              const key = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,"0")}`;
              const closed = getClosedPeriods(activeClient)[key];
              return (
                <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid rgba(22,32,50,0.6)",background:"transparent"}}>
                  <div>
                    <div style={{fontSize:13,color:"#e2e8f0"}}>{getPeriodLabel(key)}</div>
                    {closed && <div style={{fontSize:10,color:"#475569"}}>Closed on {closed.closedOn}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    {closed
                      ? <>
                          <span style={{padding:"3px 10px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:4,fontSize:10,color:"#ef4444"}}>🔒 CLOSED</span>
                          <button onClick={()=>{if(confirm(`Reopen ${getPeriodLabel(key)}?`)){reopenPeriod(activeClient,key);setClients([...clients]);}}} style={{padding:"3px 10px",background:"transparent",border:"1px solid #1e3a5f",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:10,fontFamily:"monospace"}}>Reopen</button>
                        </>
                      : <span style={{padding:"3px 10px",background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:4,fontSize:10,color:"#10b981"}}>✅ OPEN</span>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: error.message }; }
  componentDidCatch(error, info) { console.error("React error:", error, info); }
  render() {
    if (this.state.error) {
      return React.createElement('div', {style:{padding:40,color:"#ef4444",fontFamily:"monospace",background:"#070d1a",minHeight:"100vh"}},
        React.createElement('div', {style:{fontSize:20,marginBottom:16}}, "⚠️ App Error"),
        React.createElement('div', {style:{fontSize:13,color:"#94a3b8",marginBottom:16}}, this.state.error),
        React.createElement('button', {
          onClick:()=>{ localStorage.clear(); window.location.reload(); },
          style:{padding:"10px 20px",background:"#3b82f6",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:13}
        }, "Clear Cache & Reload")
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
