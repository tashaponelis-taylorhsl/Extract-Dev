LINE ITEM RULES:

AMOUNT RULES:
- Set vatCode for each line item — this is critical for correct VAT calculation:
  "V" = VAT inclusive price (7% VAT is included in the printed amount; app divides by 1.07 to get ex-VAT)

- CRITICAL: Every line item MUST have vatCode set to "N", "V", or "E". Never omit vatCode. Never return null or undefined for vatCode. A missing vatCode causes incorrect amounts to be posted to accounting software.
  When vatCode is not explicitly printed, use these rules in order:
  1. If document has a column labeled "VAT CODE", "VAT", "V/N", or "ประเภทสินค้า" → read the code per row directly from that column
  2. If all lines sum ≈ totalAmount (lines include VAT) → taxable lines vatCode="V"
  3. If all lines sum ≈ (totalAmount − vatAmount) (lines exclude VAT) → taxable lines vatCode="E"
  4. If document has no VAT row at all → all lines vatCode="N"
  5. VAT-registered vendor, uncertain → default vatCode="V"

- Thai wholesale receipts with V/N codes and ExVat column (e.g. Makro, Lotus):

  MAKRO/WHOLESALE VAT SUMMARY TABLE (rows at the bottom of the receipt) — columns in this exact order:
  Col 1: รหัส ภพ. — VAT code group label (N or V)
  Col 2: รวมจำนวนชิ้น — total quantity count (ignore)

  Col 4: มูลค่าสินค้า ExVat — ex-VAT subtotal (for verification only)

MULTIPLE INVOICES IN ONE DOCUMENT:
A PDF may contain TWO OR MORE separate supplier invoices — either inside a petty cash packet (same vendor, paid together) or as separate supplier invoices scanned into one file (same or different vendors).
Detect this when you see:
- Two separate invoice/receipt numbers on different pages
- Two separate ใบกำกับภาษี headings or receipt headings
- Two separate subtotals/VAT amounts on different pages
- Different vendor letterheads on different pages

If multiple invoices detected:
- Set "multipleInvoices": true
- Set "invoices": array where each element has: documentNumber, taxInvoiceNumber, lines, subtotal, vatAmount, totalAmount, whtRate, whtAmount
- Root "totalAmount" = sum of all invoices
- Root "vendor" = the primary/first vendor (each invoice may have its own vendor on its page — use the first)
- Root "voucherNumber" = petty cash voucher number if present, otherwise leave empty
- Root "documentDate" = date of the first invoice
If single invoice: set "multipleInvoices": false, use normal structure.

YOU MUST prioritize data from supplier invoice/receipt pages (page 2+) over summary pages:

- VENDOR NAME: use the name from the supplier invoice letterhead, not the summary
- VENDOR TAX ID: use the 13-digit number from the supplier invoice
- COMPLIANCE CHECK: perform on the supplier invoice page, not the summary page
- AMOUNTS — CRITICAL CONCEPT:
  The petty cash voucher total on Page 1 is a PAYMENT CONTROL FIGURE for the finance department showing the total cash paid out. It is NOT the amount to post.
  The posting amount is ALWAYS the individual supplier invoice total(s) on Page 2+.
  Examples:
  - Voucher total ฿5,350 covering 3 invoices → post each invoice separately at its own amount, ignore ฿5,350
  - Voucher total ฿2,100 = one invoice ฿2,100 → use invoice amount ฿2,100 (same value but read from invoice)
  - Voucher total ≠ invoice total → always use invoice total
  NEVER use the voucher total as a posting amount under any circumstances.
- ONLY use summary page data if there is absolutely no supplier invoice page present
- A summary page typically has: handwritten amounts, no letterhead, no vendor VAT number, no ใบกำกับภาษี heading

VOUCHER NUMBER SOURCE:
- Multi-page petty cash packets (summary sheet + supplier invoice pages): the voucher number (e.g. PC2604007) is on Page 1 (the summary/cover sheet). Do NOT read it from supplier invoice pages.
- Single-page documents: look for the voucher number anywhere on the page — it may be handwritten in a corner by the bookkeeper (e.g. "PC2604007" written at the top).
- If you can only find a petty cash summary sheet with NO supplier invoice pages (just a totals table), extract what is available and set extractionNote to: "Voucher summary only — no supplier invoice pages found. Amounts read from summary sheet."

DUPLICATE DOCUMENT DETECTION (CRITICAL):
- Thai petty cash packets often contain BOTH a typed tax invoice AND a handwritten cash slip (บิลเงินสด / CASH SALE) for the same transaction
- These are the SAME transaction — the cash slip is a delivery receipt/proof of payment, NOT a separate invoice
- Detection rule: if two pages show the same vendor, same items, same total amount → they are the SAME transaction; use the TYPED/PRINTED invoice only
- ALWAYS prefer the typed tax invoice page over the handwritten cash slip
- NEVER extract the handwritten cash slip as a separate invoice if a typed invoice exists for the same amount
- Page 4+ showing bank transfer slips (SCB, KBank, etc.) = payment confirmation only — ignore completely for line items
- Only treat pages as SEPARATE invoices if they have DIFFERENT invoice numbers AND DIFFERENT totals

WITHHOLDING TAX RULES (ภาษีหัก ณ ที่จ่าย):
Apply WHT only when paying a Thai juristic person or individual for services.
Use the following rates based on the service type detected from the document:

3% WHT — most services:
- Professional services, consulting, legal, accounting, audit
- Security services (รปภ, security guard)
- Cleaning services
- IT services, software, maintenance
- Construction, contractor, repair work (รับเหมา)
- Hotel accommodation
- Any service not listed in another category below

1% WHT — transport and insurance:
- Transport, freight, delivery, logistics (ขนส่ง, ขนของ)
- Insurance premiums of any kind (ประกันภัย)
- Interest payments (ดอกเบี้ย)

2% WHT:
- Advertising, marketing, promotion (โฆษณา, ประชาสัมพันธ์)

5% WHT:
- Property rental (ค่าเช่า, เช่าพื้นที่, เช่าอาคาร)
- Prize or competition winnings (รางวัล)

10% WHT:
- Dividends (เงินปันผล)

0% WHT — NOT subject to WHT:
- Purchase of goods only (no service component)
- Electricity, water, utilities (ไฟฟ้า, น้ำประปา)
- Telephone, internet bills (โทรศัพท์, อินเทอร์เน็ต)
- Petrol, fuel (น้ำมัน, เชื้อเพลิง)
- Government fees and court fees
- Postage and stamps

WHT calculation:
- whtAmount = (totalAmount - vatAmount) × whtRate / 100
- Always calculated on ex-VAT amount
- Round to 2 decimal places
- If whtRate = 0 then whtAmount = 0

Set whtConfidence = "review" when:
- Document contains mixed goods and services
- Service type is ambiguous or unclear
- Document is in Thai only with no clear service category
- WHT rate could be either 1% or 3% based on description

Set whtConfidence = "auto" when service type is clearly identifiable.
If whtRate = 0, always set whtConfidence = "auto".
